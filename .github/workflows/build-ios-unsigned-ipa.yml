name: Build iOS Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-ios-unsigned-ipa.yml"
      - "ios/**"
      - "app/**"

permissions:
  contents: read

jobs:
  build-unsigned-ipa:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen and ffmpeg
        run: brew install xcodegen ffmpeg

      - name: Prepare iOS app icon assets
        run: |
          set -euo pipefail
          echo "--- Checking icon file ---"
          ls -la app/icons/ || true
          ICON_SRC="app/icons/icon.png"
          ICON_DIR="ios/WorkWithApp/Assets.xcassets/AppIcon.appiconset"

          if [ ! -f "$ICON_SRC" ]; then
            echo "::error::Missing app icon source at $ICON_SRC"
            exit 1
          fi

          mkdir -p "$ICON_DIR"
          sips -z 40 40 "$ICON_SRC" --out "$ICON_DIR/AppIcon-40.png" >/dev/null
          sips -z 60 60 "$ICON_SRC" --out "$ICON_DIR/AppIcon-60.png" >/dev/null
          sips -z 58 58 "$ICON_SRC" --out "$ICON_DIR/AppIcon-58.png" >/dev/null
          sips -z 87 87 "$ICON_SRC" --out "$ICON_DIR/AppIcon-87.png" >/dev/null
          sips -z 80 80 "$ICON_SRC" --out "$ICON_DIR/AppIcon-80.png" >/dev/null
          sips -z 120 120 "$ICON_SRC" --out "$ICON_DIR/AppIcon-120.png" >/dev/null
          sips -z 120 120 "$ICON_SRC" --out "$ICON_DIR/AppIcon-120-large.png" >/dev/null
          sips -z 180 180 "$ICON_SRC" --out "$ICON_DIR/AppIcon-180.png" >/dev/null
          sips -z 1024 1024 "$ICON_SRC" --out "$ICON_DIR/AppIcon-1024.png" >/dev/null

      - name: Set up Node.js for avatar rendering
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Render avatar animation video
        run: |
          cd app/tools
          npm init -y
          npm install puppeteer
          node render-frames.cjs

      - name: Verify avatar video
        run: |
          ls -lh app/media/avatar/avatar-animation.mp4
          file app/media/avatar/avatar-animation.mp4

      # Copy the web app INTO the ios project tree so XcodeGen can
      # include it as a folder-reference resource — no Run Script needed.
      - name: Copy web app into iOS project
        run: |
          rm -rf ios/BundledApp
          rsync -a --exclude '.DS_Store' --exclude 'tools' app/ ios/BundledApp/
          echo "--- BundledApp contents ---"
          ls -R ios/BundledApp | head -40

      - name: Generate Xcode project
        run: xcodegen generate --spec ios/project.yml --project ios

      - name: Inspect generated project
        run: |
          mkdir -p ios/artifact
          xcodebuild -list -project ios/WorkWith.xcodeproj | tee ios/artifact/project-list.txt

      - name: Build iOS app without code signing
        run: |
          set -o pipefail
          xcodebuild \
            -project ios/WorkWith.xcodeproj \
            -scheme WorkWith \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tee ios/artifact/build.log

      - name: Emit build failure excerpt
        if: failure()
        run: |
          if [ -f ios/artifact/build.log ]; then
            echo "::group::Build log (last 60 lines)"
            tail -n 60 ios/artifact/build.log
            echo "::endgroup::"
          else
            echo "::error::build.log was not created"
          fi

      - name: Package unsigned IPA artifact
        run: |
          set -euo pipefail
          APP_PATH="$(find ios/build/Build/Products/Release-iphoneos -maxdepth 1 -type d -name 'WorkWith.app' | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "WorkWith.app not found in build products"
            find ios/build -type d -name '*.app' || true
            exit 1
          fi

          if [ ! -f "$APP_PATH/BundledApp/index.html" ]; then
            echo "BundledApp was not copied by Xcode resources; copying it into the app bundle now."
            rm -rf "$APP_PATH/BundledApp"
            cp -R ios/BundledApp "$APP_PATH/BundledApp"
          fi

          if [ ! -f "$APP_PATH/BundledApp/index.html" ]; then
            echo "::error::BundledApp/index.html is missing from WorkWith.app"
            find "$APP_PATH" -maxdepth 2 -type f | sort | head -80
            exit 1
          fi

          if [ ! -f "$APP_PATH/Assets.car" ]; then
            echo "::error::Assets.car is missing, so the iOS app icon cannot be installed correctly"
            find "$APP_PATH" -maxdepth 2 -type f | sort | head -80
            exit 1
          fi

          if ! xcrun assetutil --info "$APP_PATH/Assets.car" | grep -q '"Name" : "AppIcon"'; then
            echo "::error::Assets.car does not contain the AppIcon asset"
            xcrun assetutil --info "$APP_PATH/Assets.car" | head -120
            exit 1
          fi

          echo "--- WorkWith.app sanity check ---"
          du -sh "$APP_PATH"
          du -sh "$APP_PATH/BundledApp"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons" "$APP_PATH/Info.plist" || true

          mkdir -p ios/artifact/Payload
          cp -R "$APP_PATH" ios/artifact/Payload/

          ditto -c -k --sequesterRsrc --keepParent ios/artifact/Payload ios/artifact/WorkWith-unsigned.ipa

      - name: Upload unsigned IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WorkWith-unsigned-ipa
          path: |
            ios/artifact/WorkWith-unsigned.ipa
            ios/artifact/project-list.txt
            ios/artifact/build.log
          if-no-files-found: warn
          retention-days: 7
