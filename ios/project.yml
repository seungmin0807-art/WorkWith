name: WorkWith
options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.38.0

settings:
  base:
    PRODUCT_NAME: WorkWith
    PRODUCT_BUNDLE_IDENTIFIER: com.seungmin0807.workwith
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    TARGETED_DEVICE_FAMILY: 1
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: WorkWith
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic

targets:
  WorkWith:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: WorkWithApp
        excludes:
          - Assets.xcassets
    resources:
      - path: WorkWithApp/Assets.xcassets
      - path: BundledApp
        type: folder

schemes:
  WorkWith:
    build:
      targets:
        WorkWith: all
